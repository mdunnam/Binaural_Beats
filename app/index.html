<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Liminal</title>
    <meta name="description" content="Liminal — binaural beats app for focus, calm, and sleep.">
    <meta property="og:title" content="Liminal App">
    <meta property="og:description" content="Binaural beats, soundscapes, and AI journeys.">
    <meta property="og:url" content="https://www.theliminal.app/app">
    <meta property="og:image" content="https://www.theliminal.app/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3e8f72">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Liminal">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <script>
      // Apply theme before first paint to prevent flash
      (function() {
        var t = localStorage.getItem('binaural-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
